name: Sanity → JSON Update

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-update]

env:
  NODE_VERSION: 20

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull latest data from Sanity
        run: node scripts/copy-sanity-data.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit JSON updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "sanity-bot"
          git config user.email "bot@sanity.io"
          git add data/
          git commit -m "sync: update JSON data from Sanity [skip ci]"
          git push
