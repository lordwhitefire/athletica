name: Sanity → JSON Update

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-update]

env:
  NODE_VERSION: 20

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest from GitHub
        run: git pull --rebase origin main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull latest data from Sanity
        run: node scripts/copy-sanity-data.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit JSON updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "lordwhitefire"
          git config user.email "victormakuo2002@gmail.com"
          git add data/
          git commit -m "sync: update JSON data from Sanity [skip ci]"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Sanity sync workflow failed',
              body: `The Sanity sync workflow failed on ${{ github.ref }}.

            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the logs for details.`
            })
